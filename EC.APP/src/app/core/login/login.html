<div
    class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 py-12 px-4 sm:px-6 lg:px-8 transition-colors">
    <div
        class="max-w-md w-full space-y-8 bg-white dark:bg-gray-800 p-10 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 transition-colors">
        <div class="text-center">
            <div
                class="mx-auto h-12 w-12 rounded-xl flex items-center justify-center shadow-lg"
                [style.background-color]="state.branding().clientPrimaryColor">
                @if (state.branding().clientLogoUrl) {
                <img [src]="state.branding().clientLogoUrl" class="h-8 w-8 object-contain" />
                } @else {
                <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                }
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">{{ state.branding().companyName }} Portal</h2>
            <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">Sign in to manage your store</p>
        </div>

        <form [formGroup]="loginForm" class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
            <div class="space-y-4">
                <div>
                    <label for="email-address" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email
                        address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required
                        class="appearance-none block w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm mt-1 bg-white dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                        placeholder="admin@ecstore.com" formControlName="email">
                    <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                        class="text-red-500 text-sm">
                        Valid email is required.
                    </div>
                </div>
                <div>
                    <label for="password"
                        class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="appearance-none block w-full px-3 py-2.5 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm mt-1 bg-white dark:bg-gray-700 dark:text-white dark:placeholder-gray-400"
                        placeholder="••••••••" formControlName="password">
                    <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                        class="text-red-500 text-sm">
                        Password is required.
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900 dark:text-gray-300">Remember
                        me</label>
                </div>
                <div class="text-sm">
                    <a href="#"
                        class="font-medium text-blue-600 hover:text-blue-500 dark:text-blue-400 dark:hover:text-blue-300">Forgot
                        password?</a>
                </div>
            </div>

            <div>
                <button type="submit" [disabled]="loading()"
                    class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-70 disabled:cursor-not-allowed transition-all"
                    [style.background-color]="state.branding().clientPrimaryColor">
                    @if (loading()) {
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Signing in...
                    } @else {
                    Sign in
                    }
                </button>
            </div>

            @if(loginError) {
            <p class="text-red-600 text-sm text-center mt-4">
                Invalid login credentials. Please try again.
            </p>
            }
        </form>
    </div>
</div>
