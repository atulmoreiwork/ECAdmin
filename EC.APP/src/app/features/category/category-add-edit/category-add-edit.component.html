<div class="flex-1 overflow-y-auto">
  <form [formGroup]="AddNewCategoryForm" (ngSubmit)="submitForm()" *ngIf="AddNewCategoryForm" class="h-full">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Category Name <span
          class="text-red-500">*</span></label>
      <input type="text" formControlName="categoryName"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
        [ngClass]="{ 'is-invalid': submitted && f['categoryName'].errors }" />
      <p *ngIf="submitted && f['categoryName'].errors" class="mt-1.5 text-xs text-red-600">
        Please enter category name
      </p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2 mt-2">Description <span
          class="text-red-500">*</span></label>
      <textarea id="description" formControlName="description" rows="5" placeholder="Enter description..."
        [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"></textarea>
      <!-- <input type="text" formControlName="description" class="form-input"   [ngClass]="{ 'is-invalid': submitted && f['description'].errors }" /> -->
      <p *ngIf="submitted && f['description'].errors" class="mt-1.5 text-xs text-red-600">
        Please enter description
      </p>
    </div>
    <!-- Status -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Status
        <span class="text-red-500">*</span></label>
      <select formControlName="status"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
        <option value="">Select Status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
      <p *ngIf="submitted && AddNewCategoryForm.get('status')?.invalid" class="mt-1.5 text-xs text-red-600">
        Status is required.
      </p>
    </div>


    <!-- <div class="flex justify-end gap-2 mt-2">
        <button type="submit" class="btn-primary px-6 py-2">Submit</button>
        <button type="button" (click)="cancel()" class="btn-secondary px-6 py-2">Cancel</button>
      </div> -->

  </form>

  <!-- Feedback Messages -->
  <div class="text-green-700 mt-5" *ngIf="submitted && !addCategoryError">
    {{ successMessage || errorMessage }}
  </div>
</div>
<!-- </section> -->
