<div class="space-y-4">
    <div class="bg-white rounded-xl shadow-md border border-[var(--color-primary-100)]">
        <div class="bg-[var(--color-primary-50)] border-b border-[var(--color-primary-100)] px-4 py-3 rounded-t-xl">
            <h2 class="text-sm font-semibold text-[var(--color-primary-900)] uppercase tracking-wide">
                Product Variant Images
            </h2>
            <p class="text-xs text-gray-600 mt-1">Upload images specific to this variant</p>
        </div>
        <div class="p-5">
            <app-drag-drop-images [key]="key" (imageListChange)="onImageListChange($event)"></app-drag-drop-images>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-md border border-[var(--color-primary-100)]" *ngIf="documents.length > 0">
        <div class="bg-[var(--color-primary-50)] border-b border-[var(--color-primary-100)] px-4 py-3 rounded-t-xl">
            <h2 class="text-sm font-semibold text-[var(--color-primary-900)] uppercase tracking-wide">
                Uploaded Product Variant Images
            </h2>
        </div>
        <div class="p-5">
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <div class="relative group" *ngFor="let document of documents | excludeDeleted">
                    <button (click)="removeDocument(document)"
                        class="absolute top-2 right-2 bg-red-500 text-white p-1.5 rounded-full hover:bg-red-600 transition shadow-lg opacity-0 group-hover:opacity-100 z-10"
                        title="Remove image">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                    <img [src]="document.fileUrl" [alt]="document.fileName"
                        class="w-full h-32 object-cover rounded-lg shadow border border-gray-200 transition-transform duration-200 group-hover:scale-105" />
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div class="bg-gray-50 rounded-xl border border-gray-200 p-6 text-center"
        *ngIf="documents.length === 0 && uploadedImages.length === 0">
        <svg class="w-12 h-12 mx-auto text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-sm text-gray-600 font-medium">No images uploaded yet</p>
        <p class="text-xs text-gray-500 mt-1">Drag and drop or paste images above to get started</p>
    </div>
</div>
