<div class="bg-white">
  <form [formGroup]="addeditRoleForm" (ngSubmit)="submitForm()" *ngIf="addeditRoleForm" class="space-y-5">
    <div class="space-y-1.5">
      <label class="block text-sm font-medium text-gray-700">
        Role Name <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="roleName"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow"
        placeholder="Enter role name"
        [class.border-red-500]="submitted && f['roleName'].errors"
        [class.focus:ring-red-500]="submitted && f['roleName'].errors"
        [class.focus:border-red-500]="submitted && f['roleName'].errors"
      />
      <p *ngIf="submitted && f['roleName'].errors" class="text-xs text-red-600">
        Please enter role name
      </p>
    </div>

    <div class="space-y-1.5">
      <label class="block text-sm font-medium text-gray-700">
        Description <span class="text-red-500">*</span>
      </label>
      <textarea
        formControlName="roleDescription"
        rows="4"
        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow resize-none"
        placeholder="Enter role description"
        [class.border-red-500]="submitted && f['roleDescription'].errors"
        [class.focus:ring-red-500]="submitted && f['roleDescription'].errors"
        [class.focus:border-red-500]="submitted && f['roleDescription'].errors"
      ></textarea>
      <p *ngIf="submitted && f['roleDescription'].errors" class="text-xs text-red-600">
        Please enter description
      </p>
    </div>

    <div *ngIf="submitted && addRoleError && errorMessage" class="mt-1">
      <div class="px-4 py-3 rounded-lg text-sm bg-red-50 border border-red-200 text-red-800 whitespace-pre-line">
        {{ errorMessage }}
      </div>
    </div>
  </form>
</div>
