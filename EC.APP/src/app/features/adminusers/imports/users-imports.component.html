<div class="bg-white rounded-lg shadow-sm overflow-hidden">
  <div
    class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-[var(--color-primary-100)] p-4">
    <h3 class="text-xl font-semibold">User Import</h3>
    <button (click)="downloadSample()" class="btn-primary">
      📥 Download Sample Excel
    </button>
  </div>
  <div class="w-full px-6 py-6">
    <div
      class="flex flex-col items-center justify-center w-full  p-6 mx-auto border-2 border-dashed rounded-2xl border-[var(--color-primary-400)] 
         hover:border-[var(--color-primary-600)] transition  bg-[var(--color-primary-100)]   hover:bg-[var(--color-primary-150)] cursor-pointer "
      (drop)="onFileDrop($event)" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
      [class.border-green-500]="fileValid" [class.border-red-500]="fileError">
      <div class="flex flex-col items-center gap-2 text-center">
        <svg class="w-12 h-12 text-[var(--color-primary-500)]" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M7 16a4 4 0 01-.88-7.9A5 5 0 1115.9 6h1.6a5 5 0 011 9.9M15 13l-3 3m0 0l-3-3m3 3V10" />
        </svg>
        <p class="text-sm text-gray-600">Drag & drop your Excel file here, or</p>
        <label class="cursor-pointer text-[var(--color-primary-600)] font-medium hover:underline">
          browse
          <input type="file" class="hidden" (change)="onFileSelected($event)" accept=".xlsx,.xls" />
        </label>
        <p class="text-xs text-gray-500">Only .xlsx or .xls files</p>
      </div>

      <div *ngIf="fileName" class="mt-4 text-sm text-gray-700">
        Selected: <span class="font-semibold">{{ fileName }}</span>
      </div>

      <div *ngIf="uploadMessage" class="mt-3 text-sm"
        [ngClass]="{'text-green-600': uploadSuccess, 'text-red-600': !uploadSuccess}">
        {{ uploadMessage }}
      </div>

      <button *ngIf="selectedFile"
        class="mt-6 px-4 py-2 text-white bg-gray-900 dark:bg-gray-100 dark:text-gray-900 hover:bg-gray-800 dark:hover:bg-gray-200 rounded-lg\"
        (click)="uploadFile()">
        Upload
      </button>
    </div>
  </div>
</div>
