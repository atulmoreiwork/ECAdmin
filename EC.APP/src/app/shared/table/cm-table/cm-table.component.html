<div
  class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm overflow-hidden flex flex-col transition-colors">
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr
          class="bg-gray-50 dark:bg-gray-900/50 border-b border-gray-200 dark:border-gray-700 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
          <ng-container *ngFor="let column of tableObject.columns">
            <th *ngIf="column.isDisplayOnGrid && column.type == 'gridcheckbox'" class="px-6 py-4 w-12">
              <input type="checkbox"
                class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500 dark:bg-gray-700"
                [checked]="isAllCheckBoxChecked()" (change)="checkAllCheckBox($event)" />
            </th>
            <th *ngIf="column.isDisplayOnGrid && column.type != 'gridcheckbox'"
              class="px-6 py-4 whitespace-nowrap cursor-pointer select-none"
              (click)="tableObject.gridConfig.isShowSorting ? sortData($event) : null">
              <div class="flex items-center gap-2">
                {{ column.displayName }}
                <ng-container *ngIf="column.isSorting">
                  <svg *ngIf="colmnName === column.name && sortObj.orderBy === 1"
                    class="w-3 h-3 text-gray-700 dark:text-gray-200" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M5 12l5-5 5 5H5z" />
                  </svg>
                  <svg *ngIf="colmnName === column.name && sortObj.orderBy === -1"
                    class="w-3 h-3 text-gray-700 dark:text-gray-200" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M5 8l5 5 5-5H5z" />
                  </svg>
                </ng-container>
              </div>
            </th>
          </ng-container>
        </tr>

        <tr *ngIf="tableObject.gridConfig.isShowFilter"
          class="border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800">
          <ng-container *ngFor="let column of tableObject.columns">
            <th *ngIf="column.isDisplayOnGrid" class="px-6 py-3">
              <ng-container *ngIf="column.filter.isFiltering">
                <input *ngIf="column.filter.filterInputType == 'input'" (input)="filterData($event)"
                  [attr.columnName]="column.name" placeholder="Filter..." class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg
                              dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200
                              focus:ring-2 focus:ring-blue-500 outline-none" />
                <div *ngIf="column.filter.filterInputType == 'date' &&  column.filter.filterType == 'daterange'"
                  class="flex gap-2">
                  <input type="date" [attr.columnName]="column.filter.filterFrom" (input)="filterData($event)"
                    class="w-full px-2 py-2 text-sm border rounded-lg dark:bg-gray-700 dark:border-gray-600" />
                  <input type="date" [attr.columnName]="column.filter.filterTo" (input)="filterData($event)"
                    class="w-full px-2 py-2 text-sm border rounded-lg dark:bg-gray-700 dark:border-gray-600" />
                </div>
              </ng-container>
            </th>
          </ng-container>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
        <tr *ngFor="let row of tableObject.rows" class="hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors">
          <ng-container *ngFor="let column of tableObject.columns">
            <td *ngIf="column.isDisplayOnGrid && column.type == 'gridcheckbox'" class="px-6 py-4">
              <input type="checkbox"
                class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500 dark:bg-gray-700"
                [(ngModel)]="row[column.name]" />
            </td>
            <td *ngIf="column.isDisplayOnGrid && column.type != 'gridcheckbox'"
              class="px-6 py-4 text-sm text-gray-700 dark:text-gray-300 whitespace-nowrap">

              <ng-container *ngIf="column.html; else normalCell">
                <ng-container [ngTemplateOutlet]="template[column.htmlName]" [ngTemplateOutletContext]="{ data: row }">
                </ng-container>
              </ng-container>
              <ng-template #normalCell>
                <span [innerHtml]="row[column.name]"></span>
              </ng-template>
            </td>
          </ng-container>
        </tr>

        <tr *ngIf="tableObject.rows.length === 0">
          <td colspan="100%" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
            No Records Found
          </td>
        </tr>

        <tr *ngIf="isShowInsertion == 'Y'" class="bg-gray-50 dark:bg-gray-900">
          <ng-container *ngFor="let column of tableObject.columns">
            <td class="px-6 py-4">
              <ng-container *ngIf="
                column.insertDetails.isDisplayOnGrid &&
                column.insertDetails.name.toLowerCase() != 'action' &&
                column.insertDetails.name.toLowerCase() != 'action(s)'
              ">
                <input [(ngModel)]="column.insertDetails.value" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg
                         dark:bg-gray-700 dark:border-gray-600 dark:text-gray-200
                         focus:ring-2 focus:ring-green-500 outline-none" />
              </ng-container>
              <button *ngIf="
                column.insertDetails.name.toLowerCase() == 'action' ||
                column.insertDetails.name.toLowerCase() == 'action(s)'
              " (click)="addClick()" class="text-green-600 hover:text-green-700 text-lg">
                ➕
              </button>
            </td>
          </ng-container>
        </tr>
      </tbody>
    </table>
  </div>
  <cm-table-pagination [tableObject]="tableObject" (pageChange)="pChange($event)"
    (pageSizeChange)="pageSizeChange($event)">
  </cm-table-pagination>
</div>
